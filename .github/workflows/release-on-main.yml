name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install packaging deps
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Install WASI SDK
        run: |
          WASI_SDK_VERSION="22.0"
          WASI_SDK_TAG="${WASI_SDK_VERSION%%.*}"
          WASI_SDK_DIR="$RUNNER_TEMP/wasi-sdk-$WASI_SDK_VERSION"
          curl -fsSL "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-$WASI_SDK_TAG/wasi-sdk-$WASI_SDK_VERSION-linux.tar.gz" -o "$RUNNER_TEMP/wasi-sdk.tar.gz"
          mkdir -p "$RUNNER_TEMP"
          tar -xzf "$RUNNER_TEMP/wasi-sdk.tar.gz" -C "$RUNNER_TEMP"
          echo "WASI_SDK_PATH=$WASI_SDK_DIR" >> "$GITHUB_ENV"

      - name: Bump plugin version
        id: bump
        run: |
          chmod +x scripts/bump-plugin-version.py
          NEXT_VERSION=$(python3 scripts/bump-plugin-version.py)
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add EMMA.VideoTest.plugin.json
          git commit -m "chore(release): bump plugin version to ${{ steps.bump.outputs.next_version }} [skip ci]"
          git push origin HEAD:main

      - name: Verify manifest signing key
        env:
          EMMA_HMAC_KEY_BASE64: ${{ secrets.EMMA_HMAC_KEY_BASE64 }}
        run: |
          if [[ -z "${EMMA_HMAC_KEY_BASE64}" ]]; then
            echo "Missing required secret: EMMA_HMAC_KEY_BASE64" >&2
            exit 1
          fi

      - name: Build release package
        env:
          EMMA_SDK_VERSION: ${{ vars.EMMA_SDK_VERSION || '0.1.0' }}
          ASPNET_NO_RESTORE: "1"
          ASPNET_TARGET_RID: "linux-x64"
          WASM_TARGET: "wasm"
          EMMA_REQUIRE_SIGNED_PLUGINS: "1"
          EMMA_HMAC_KEY_BASE64: ${{ secrets.EMMA_HMAC_KEY_BASE64 }}
        run: |
          chmod +x scripts/plugin-validate-manifest.sh
          chmod +x scripts/build-pack-plugin.sh
          chmod +x scripts/build-pack-plugin-aspnet.sh
          dotnet nuget locals all --clear
          dotnet restore EMMA.VideoTest.csproj \
            --no-cache \
            --force-evaluate \
            --runtime "$ASPNET_TARGET_RID" \
            --source https://api.nuget.org/v3/index.json \
            --source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-experimental/nuget/v3/index.json \
            -p:PluginTransport=AspNet \
            -p:EmmaSdkVersion="$EMMA_SDK_VERSION"

          TARGETS="$ASPNET_TARGET_RID" \
          EMMA_SDK_VERSION="$EMMA_SDK_VERSION" \
          scripts/build-pack-plugin-aspnet.sh EMMA.VideoTest.plugin.json

          TARGETS="$WASM_TARGET" \
          EMMA_SDK_VERSION="$EMMA_SDK_VERSION" \
          WASM_NATIVE_CODEGEN="llvm" \
          WASI_SDK_PATH="$WASI_SDK_PATH" \
          scripts/build-pack-plugin.sh EMMA.VideoTest.plugin.json

      - name: Compute sha256
        id: sha
        run: |
          ASPNET_ASSET_PATH="artifacts/pack/emma.video.test_${{ steps.bump.outputs.next_version }}_linux-x64.zip"
          WASM_ASSET_PATH="artifacts/pack/emma.video.test_${{ steps.bump.outputs.next_version }}_wasm.zip"
          ASPNET_SHA256=$(sha256sum "$ASPNET_ASSET_PATH" | awk '{print $1}')
          WASM_SHA256=$(sha256sum "$WASM_ASSET_PATH" | awk '{print $1}')
          echo "aspnet_asset_path=$ASPNET_ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "wasm_asset_path=$WASM_ASSET_PATH" >> "$GITHUB_OUTPUT"
          echo "aspnet_sha256=$ASPNET_SHA256" >> "$GITHUB_OUTPUT"
          echo "wasm_sha256=$WASM_SHA256" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          git tag "${{ steps.bump.outputs.next_tag }}"
          git push origin "${{ steps.bump.outputs.next_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.next_tag }}
          name: ${{ steps.bump.outputs.next_tag }}
          generate_release_notes: true
          body: |
            Automated release for EMMA Video Test Plugin.

            Artifact SHA-256:
            - `emma.video.test_${{ steps.bump.outputs.next_version }}_linux-x64.zip`: `${{ steps.sha.outputs.aspnet_sha256 }}`
            - `emma.video.test_${{ steps.bump.outputs.next_version }}_wasm.zip`: `${{ steps.sha.outputs.wasm_sha256 }}`
          files: |
            ${{ steps.sha.outputs.aspnet_asset_path }}
            ${{ steps.sha.outputs.wasm_asset_path }}
